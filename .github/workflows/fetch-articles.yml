name: Fetch Articles

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.MLFLOW_AUTOMATION_TOKEN }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Fetch articles from BabyLoveGrowth
        env:
          BABYLOVEGROWTH_API_KEY: ${{ secrets.BABYLOVEGROWTH_API_KEY }}
        run: node .github/scripts/fetch-articles.js

      - name: Format fetched articles
        working-directory: website
        run: npm run fmt

      - name: Create PR if changed
        env:
          GH_TOKEN: ${{ secrets.MLFLOW_AUTOMATION_TOKEN }}
        run: |
          git config user.name 'mlflow-automation'
          git config user.email 'mlflow-automation@users.noreply.github.com'
          git add website/article/
          if git diff --cached --quiet; then
            echo "No new articles"
            exit 0
          fi
          BRANCH="articles/sync-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "Sync articles from BabyLoveGrowth"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "Sync articles from BabyLoveGrowth" \
            --body "Automated daily sync of new articles from BabyLoveGrowth API." \
            --base main \
            --head "$BRANCH")
          echo "Created PR: $PR_URL"
          gh pr merge "$PR_URL" --auto --squash
