name: CI

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: 20
      - working-directory: website
        run: npm ci
      - working-directory: website
        run: npm run lint
      - working-directory: website
        run: |
          npm run fmt
          git diff --exit-code
      - working-directory: website
        run: npm run build
