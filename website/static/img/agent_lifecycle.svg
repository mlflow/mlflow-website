<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Kurzgesagt-style gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1B2838"/>
      <stop offset="100%" style="stop-color:#0F1923"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#E63946"/>
    </linearGradient>
    <linearGradient id="loopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F77F00"/>
      <stop offset="100%" style="stop-color:#E63946"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A9D8F"/>
      <stop offset="100%" style="stop-color:#238A7E"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#457B9D"/>
      <stop offset="100%" style="stop-color:#3A6A8A"/>
    </linearGradient>
    <linearGradient id="cardGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E76F51"/>
      <stop offset="100%" style="stop-color:#D45D3F"/>
    </linearGradient>
    <linearGradient id="cardGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6A4C93"/>
      <stop offset="100%" style="stop-color:#5A3D82"/>
    </linearGradient>
    <linearGradient id="cardGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D3557"/>
      <stop offset="100%" style="stop-color:#162B47"/>
    </linearGradient>
    <linearGradient id="cardGrad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#264653"/>
      <stop offset="100%" style="stop-color:#1D3640"/>
    </linearGradient>
    <linearGradient id="cardGrad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E9C46A"/>
      <stop offset="100%" style="stop-color:#D4AF55"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <!-- Star shape -->
    <polygon id="star" points="0,-6 1.8,-2 6,-2 2.8,1.2 4,5.5 0,3 -4,5.5 -2.8,1.2 -6,-2 -1.8,-2" fill="#F4D35E" opacity="0.15"/>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <!-- Subtle background stars -->
  <use href="#star" x="100" y="120"/>
  <use href="#star" x="350" y="60"/>
  <use href="#star" x="700" y="45"/>
  <use href="#star" x="950" y="90"/>
  <use href="#star" x="1100" y="150"/>
  <use href="#star" x="80" y="400"/>
  <use href="#star" x="1150" y="500"/>
  <use href="#star" x="200" y="700"/>
  <use href="#star" x="1050" y="720"/>
  <use href="#star" x="550" y="750"/>
  <use href="#star" x="820" y="30"/>
  <use href="#star" x="450" y="780"/>

  <!-- Title -->
  <text x="600" y="58" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="800" fill="#FFFFFF" letter-spacing="1">OVERVIEW OF THE AGENT DEVELOPMENT LIFECYCLE</text>
  <rect x="280" y="68" width="640" height="3" rx="1.5" fill="url(#loopGrad)" opacity="0.6"/>

  <!-- ==================== ITERATION BRACKET (left side) — Steps 3-5 ==================== -->

  <!-- ==================== FLOW ARROW (right side) ==================== -->
  <g transform="translate(1090, 105)" filter="url(#softShadow)">
    <!-- Large downward arrow -->
    <rect x="-22" y="0" width="44" height="550" rx="8" fill="url(#arrowGrad)" opacity="0.9"/>
    <!-- Arrowhead -->
    <polygon points="0,610 -50,540 -22,550 -22,550 22,550 22,550 50,540" fill="#E63946"/>
    <!-- Pulse lines on the arrow -->
    <rect x="-14" y="60" width="28" height="3" rx="1.5" fill="#FFF" opacity="0.15"/>
    <rect x="-14" y="130" width="28" height="3" rx="1.5" fill="#FFF" opacity="0.15"/>
    <rect x="-14" y="200" width="28" height="3" rx="1.5" fill="#FFF" opacity="0.15"/>
    <rect x="-14" y="270" width="28" height="3" rx="1.5" fill="#FFF" opacity="0.15"/>
    <rect x="-14" y="340" width="28" height="3" rx="1.5" fill="#FFF" opacity="0.15"/>
    <rect x="-14" y="410" width="28" height="3" rx="1.5" fill="#FFF" opacity="0.15"/>
    <rect x="-14" y="480" width="28" height="3" rx="1.5" fill="#FFF" opacity="0.15"/>
  </g>

  <!-- ==================== STEP CARDS ==================== -->

  <!-- Step 1: Build a working prototype -->
  <g transform="translate(330, 115)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="700" height="60" rx="12" fill="url(#cardGrad1)"/>
    <!-- Number circle -->
    <circle cx="35" cy="30" r="20" fill="#1B2838" opacity="0.4"/>
    <text x="35" y="36" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">1</text>
    <!-- Icon: rocket -->
    <g transform="translate(75, 18)">
      <rect x="0" y="4" width="22" height="16" rx="5" fill="#FFF" opacity="0.25"/>
      <polygon points="22,12 30,8 30,16" fill="#FFF" opacity="0.25"/>
      <circle cx="10" cy="12" r="3" fill="#FFF" opacity="0.4"/>
    </g>
    <!-- Text -->
    <text x="115" y="26" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">BUILD A WORKING PROTOTYPE</text>
    <text x="115" y="44" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.75">that passes basic quality "vibe checks"</text>
    <!-- Connector dot -->
    <circle cx="0" cy="30" r="6" fill="#F77F00" stroke="#1B2838" stroke-width="2"/>
  </g>

  <!-- Step 2: Test drive LLM Judges -->
  <g transform="translate(330, 205)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="700" height="60" rx="12" fill="url(#cardGrad2)"/>
    <circle cx="35" cy="30" r="20" fill="#1B2838" opacity="0.4"/>
    <text x="35" y="36" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">2</text>
    <!-- Icon: gavel/judge -->
    <g transform="translate(75, 17)">
      <rect x="2" y="16" width="20" height="4" rx="2" fill="#FFF" opacity="0.25"/>
      <rect x="8" y="4" width="8" height="14" rx="3" fill="#FFF" opacity="0.25"/>
      <circle cx="12" cy="6" r="4" fill="#FFF" opacity="0.3"/>
    </g>
    <text x="115" y="26" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">TEST DRIVE LLM JUDGES AND HUMAN TESTERS</text>
    <text x="115" y="44" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.75">automated scoring + human-in-the-loop evaluation</text>
    <circle cx="0" cy="30" r="6" fill="#F77F00" stroke="#1B2838" stroke-width="2"/>
  </g>

  <!-- Connecting lines between cards -->
  <line x1="330" y1="175" x2="330" y2="205" stroke="#F77F00" stroke-width="2" opacity="0.5"/>
  <line x1="330" y1="265" x2="330" y2="295" stroke="#F77F00" stroke-width="2" opacity="0.5"/>
  <line x1="330" y1="355" x2="330" y2="385" stroke="#F77F00" stroke-width="2" opacity="0.5"/>
  <line x1="330" y1="445" x2="330" y2="475" stroke="#F77F00" stroke-width="2" opacity="0.5"/>
  <line x1="330" y1="535" x2="330" y2="565" stroke="#F77F00" stroke-width="2" opacity="0.5"/>
  <line x1="330" y1="625" x2="330" y2="655" stroke="#F77F00" stroke-width="2" opacity="0.5"/>

  <!-- Step 3: Identify quality issues -->
  <g transform="translate(330, 295)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="700" height="60" rx="12" fill="url(#cardGrad3)"/>
    <circle cx="35" cy="30" r="20" fill="#1B2838" opacity="0.4"/>
    <text x="35" y="36" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">3</text>
    <!-- Icon: magnifying glass -->
    <g transform="translate(75, 15)">
      <circle cx="10" cy="10" r="8" fill="none" stroke="#FFF" stroke-width="2.5" opacity="0.3"/>
      <line x1="16" y1="16" x2="24" y2="24" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
    </g>
    <text x="115" y="26" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">IDENTIFY QUALITY ISSUES</text>
    <text x="115" y="44" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.75">root-cause analysis of failure modes and edge cases</text>
    <circle cx="0" cy="30" r="6" fill="#F77F00" stroke="#1B2838" stroke-width="2"/>
  </g>

  <!-- Step 4: Fix issues in agent code -->
  <g transform="translate(330, 385)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="700" height="60" rx="12" fill="url(#cardGrad4)"/>
    <circle cx="35" cy="30" r="20" fill="#1B2838" opacity="0.4"/>
    <text x="35" y="36" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">4</text>
    <!-- Icon: wrench -->
    <g transform="translate(75, 15)">
      <rect x="4" y="10" width="18" height="6" rx="3" fill="#FFF" opacity="0.25" transform="rotate(-45, 13, 13)"/>
      <circle cx="8" cy="8" r="5" fill="none" stroke="#FFF" stroke-width="2" opacity="0.3"/>
    </g>
    <text x="115" y="26" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">FIX ISSUES IN AGENT CODE</text>
    <text x="115" y="44" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.75">prompts, tools, guardrails, and orchestration logic</text>
    <circle cx="0" cy="30" r="6" fill="#F77F00" stroke="#1B2838" stroke-width="2"/>
  </g>

  <!-- Step 5: Test fixes -->
  <g transform="translate(330, 475)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="700" height="60" rx="12" fill="url(#cardGrad5)"/>
    <circle cx="35" cy="30" r="20" fill="#1B2838" opacity="0.4"/>
    <text x="35" y="36" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">5</text>
    <!-- Icon: checkmark -->
    <g transform="translate(75, 17)">
      <rect x="0" y="0" width="24" height="20" rx="4" fill="#FFF" opacity="0.2"/>
      <polyline points="6,11 10,16 20,5" fill="none" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
    </g>
    <text x="115" y="26" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">TEST FIXES</text>
    <text x="115" y="44" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.75">regression testing and validation against evaluation suite</text>
    <circle cx="0" cy="30" r="6" fill="#F77F00" stroke="#1B2838" stroke-width="2"/>
  </g>

  <!-- Step 6: Get stakeholder sign-off -->
  <g transform="translate(330, 565)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="700" height="60" rx="12" fill="url(#cardGrad6)"/>
    <circle cx="35" cy="30" r="20" fill="#1B2838" opacity="0.4"/>
    <text x="35" y="36" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">6</text>
    <!-- Icon: thumbs up -->
    <g transform="translate(75, 15)">
      <rect x="0" y="10" width="6" height="14" rx="2" fill="#FFF" opacity="0.25"/>
      <path d="M8,10 L8,4 C8,2 10,0 12,0 L18,0 C20,0 22,2 22,4 L22,16 C22,18 20,20 18,20 L10,20 C8,20 8,18 8,16 Z" fill="#FFF" opacity="0.2"/>
    </g>
    <text x="115" y="26" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">GET STAKEHOLDER SIGN-OFF FOR PRODUCTION</text>
    <text x="115" y="44" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.75">demo results, review metrics, and approve deployment</text>
    <circle cx="0" cy="30" r="6" fill="#F77F00" stroke="#1B2838" stroke-width="2"/>
  </g>

  <!-- Step 7: Release to production -->
  <g transform="translate(330, 655)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="700" height="60" rx="12" fill="url(#cardGrad7)"/>
    <circle cx="35" cy="30" r="20" fill="#1B2838" opacity="0.4"/>
    <text x="35" y="36" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">7</text>
    <!-- Icon: rocket launch -->
    <g transform="translate(75, 14)">
      <polygon points="12,0 22,12 18,12 20,22 12,16 4,22 6,12 2,12" fill="#1B2838" opacity="0.3"/>
    </g>
    <text x="115" y="26" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="800" fill="#1B2838">RELEASE AGENT TO PRODUCTION</text>
    <text x="115" y="44" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#1B2838" opacity="0.7">deploy, monitor quality, and iterate on new use cases</text>
    <circle cx="0" cy="30" r="6" fill="#E63946" stroke="#1B2838" stroke-width="2"/>
  </g>

  <!-- Bold bracket connecting steps 3-5 with ITERATE label -->
  <g>
    <!-- Bracket: right edge of step 5 bottom, down, left, up to step 3 top, with arrowhead -->
    <path d="M 318,325 L 295,325 L 295,505 L 318,505" fill="none" stroke="#F77F00" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Upward arrow returning from step 5 back to step 3 -->
    <path d="M 295,505 L 270,505 L 270,330 L 295,325" fill="none" stroke="#F77F00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.0"/>
    <!-- Arrowhead pointing up at the top of the bracket -->
    <polygon points="318,325 308,335 310,325" fill="#F77F00"/>
    <!-- Arrowhead pointing down at the bottom of the bracket -->
    <polygon points="318,505 308,495 310,505" fill="#F77F00"/>
    <!-- ITERATE label -->
    <g transform="translate(295, 415)">
      <rect x="-60" y="-14" width="55" height="28" rx="14" fill="#F77F00" filter="url(#cardShadow)"/>
      <text x="-32" y="5" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">ITERATE</text>
    </g>
  </g>

  <!-- Subtle bottom attribution -->
  <text x="600" y="770" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.2">Agent Development Lifecycle</text>
</svg>