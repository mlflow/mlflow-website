<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 1286" width="1760" height="1286">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0d1b2a"/>
    <stop offset="100%" style="stop-color:#1b2838"/>
  </linearGradient>
  <style>text { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }</style>
</defs>

<!-- Background -->
<rect width="1760" height="1286" fill="url(#bg)"/>

<!-- MLflow logo text -->
<text x="480" y="280" font-size="120" font-weight="300" fill="#f8f9fa">ml</text>
<text x="650" y="280" font-size="120" font-weight="700" font-style="italic" fill="#0194E2">flow</text>

<!-- Plus sign -->
<text x="920" y="280" font-size="80" font-weight="300" fill="#ffffff">+</text>

<!-- AISI red lettermark (simplified) -->
<text x="1020" y="270" font-size="100" font-weight="700" fill="#F90D29" letter-spacing="4">AISI</text>

<!-- Subtitle -->
<text x="880" y="380" font-size="42" fill="#94a3b8" text-anchor="middle">Tracking and Debugging AI Safety Evaluations</text>

<!-- Feature cards row -->
<!-- Card 1: Tracking -->
<rect x="160" y="480" width="440" height="280" rx="16" fill="#1971c2" fill-opacity="0.15" stroke="#1971c2" stroke-width="2"/>
<text x="380" y="540" font-size="32" fill="#4dabf7" text-anchor="middle" font-weight="600">Experiment Tracking</text>
<text x="380" y="590" font-size="22" fill="#94a3b8" text-anchor="middle">Hierarchical runs per eval</text>
<text x="380" y="630" font-size="22" fill="#94a3b8" text-anchor="middle">Per-sample metrics</text>
<text x="380" y="670" font-size="22" fill="#94a3b8" text-anchor="middle">Token usage + artifacts</text>
<text x="380" y="720" font-size="18" fill="#495057" text-anchor="middle">MLFLOW_TRACKING_URI</text>

<!-- Card 2: Tracing -->
<rect x="660" y="480" width="440" height="280" rx="16" fill="#087f5b" fill-opacity="0.15" stroke="#12b886" stroke-width="2"/>
<text x="880" y="540" font-size="32" fill="#12b886" text-anchor="middle" font-weight="600">Execution Tracing</text>
<text x="880" y="590" font-size="22" fill="#94a3b8" text-anchor="middle">Span tree per evaluation</text>
<text x="880" y="630" font-size="22" fill="#94a3b8" text-anchor="middle">LLM / Tool / Score spans</text>
<text x="880" y="670" font-size="22" fill="#94a3b8" text-anchor="middle">Token counts + responses</text>
<text x="880" y="720" font-size="18" fill="#495057" text-anchor="middle">MLFLOW_INSPECT_TRACING=true</text>

<!-- Card 3: Scout -->
<rect x="1160" y="480" width="440" height="280" rx="16" fill="#1864ab" fill-opacity="0.15" stroke="#4dabf7" stroke-width="2" stroke-dasharray="8,4"/>
<text x="1380" y="540" font-size="32" fill="#4dabf7" text-anchor="middle" font-weight="600">Scout Import</text>
<text x="1380" y="590" font-size="22" fill="#94a3b8" text-anchor="middle">MLflow traces to transcripts</text>
<text x="1380" y="630" font-size="22" fill="#94a3b8" text-anchor="middle">Safety scanner analysis</text>
<text x="1380" y="670" font-size="22" fill="#94a3b8" text-anchor="middle">Cross-ecosystem bridge</text>
<text x="1380" y="720" font-size="18" fill="#495057" text-anchor="middle">import_mlflow_traces()</text>

<!-- Bottom badges -->
<rect x="340" y="860" width="220" height="52" rx="26" fill="#1971c2" fill-opacity="0.2" stroke="#1971c2" stroke-width="1.5"/>
<text x="450" y="892" font-size="20" fill="#4dabf7" text-anchor="middle">pip install</text>

<rect x="600" y="860" width="260" height="52" rx="26" fill="#087f5b" fill-opacity="0.2" stroke="#12b886" stroke-width="1.5"/>
<text x="730" y="892" font-size="20" fill="#12b886" text-anchor="middle">Auto-registers</text>

<rect x="900" y="860" width="260" height="52" rx="26" fill="#1864ab" fill-opacity="0.2" stroke="#4dabf7" stroke-width="1.5"/>
<text x="1030" y="892" font-size="20" fill="#4dabf7" text-anchor="middle">No code changes</text>

<rect x="1200" y="860" width="220" height="52" rx="26" fill="#495057" fill-opacity="0.3" stroke="#868e96" stroke-width="1.5"/>
<text x="1310" y="892" font-size="20" fill="#adb5bd" text-anchor="middle">40 tests</text>

<!-- Bottom context -->
<text x="880" y="1000" font-size="28" fill="#495057" text-anchor="middle">UK AI Security Institute's evaluation framework + MLflow experiment tracking</text>
<text x="880" y="1050" font-size="24" fill="#495057" text-anchor="middle">47M+ combined monthly PyPI downloads</text>
</svg>
