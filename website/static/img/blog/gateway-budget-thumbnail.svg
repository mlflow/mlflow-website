<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
  <!-- Background -->
  <rect width="1400" height="800" fill="#f5f7fa"/>

  <!-- Subtle grid background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e8ecf1" stroke-width="1"/>
    </pattern>

    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0194E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0178B8;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#50C878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3DA55E;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E94B3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D43D2F;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="800" fill="url(#grid)"/>

  <!-- Title -->
  <text x="700" y="80" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="38" font-weight="bold" text-anchor="middle">AI Gateway Budget Alerts &amp; Limits</text>
  <text x="700" y="115" fill="#666" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Control LLM spend with configurable budget policies</text>

  <!-- Left: Budget Policy Card -->
  <g transform="translate(80, 160)" filter="url(#shadow)">
    <rect width="380" height="460" rx="16" fill="white" stroke="#d1d9e6" stroke-width="2"/>

    <!-- Card header -->
    <rect width="380" height="60" rx="16" fill="url(#blueGrad)"/>
    <rect y="44" width="380" height="16" fill="url(#blueGrad)"/>

    <!-- Header icon - shield -->
    <g transform="translate(30, 30)">
      <path d="M 0 -12 L -10 -6 L -10 4 C -10 10 0 16 0 16 C 0 16 10 10 10 4 L 10 -6 Z" fill="white" opacity="0.4"/>
    </g>
    <text x="52" y="38" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Budget Policy</text>

    <!-- Policy details -->
    <text x="24" y="100" fill="#999" font-family="Arial, sans-serif" font-size="13" font-weight="bold" letter-spacing="1">THRESHOLD</text>
    <text x="24" y="130" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="32" font-weight="bold">$500.00</text>
    <text x="180" y="130" fill="#999" font-family="Arial, sans-serif" font-size="16">/ month</text>

    <!-- Divider -->
    <line x1="24" y1="150" x2="356" y2="150" stroke="#e8ecf1" stroke-width="1"/>

    <!-- Current spend -->
    <text x="24" y="180" fill="#999" font-family="Arial, sans-serif" font-size="13" font-weight="bold" letter-spacing="1">CURRENT SPEND</text>
    <text x="24" y="210" fill="#FF6B35" font-family="Arial, sans-serif" font-size="28" font-weight="bold">$487.32</text>

    <!-- Progress bar -->
    <rect x="24" y="230" width="332" height="12" rx="6" fill="#e8ecf1"/>
    <rect x="24" y="230" width="323" height="12" rx="6" fill="url(#orangeGrad)"/>
    <text x="356" y="260" fill="#999" font-family="Arial, sans-serif" font-size="12" text-anchor="end">97.5%</text>

    <!-- Action -->
    <text x="24" y="300" fill="#999" font-family="Arial, sans-serif" font-size="13" font-weight="bold" letter-spacing="1">ACTION</text>
    <rect x="24" y="312" width="80" height="30" rx="15" fill="#FFF3E0"/>
    <text x="64" y="332" fill="#FF6B35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Alert</text>

    <!-- Window -->
    <text x="130" y="300" fill="#999" font-family="Arial, sans-serif" font-size="13" font-weight="bold" letter-spacing="1">WINDOW</text>
    <rect x="130" y="312" width="90" height="30" rx="15" fill="#E3F2FD"/>
    <text x="175" y="332" fill="#0194E2" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Monthly</text>

    <!-- Scope -->
    <text x="246" y="300" fill="#999" font-family="Arial, sans-serif" font-size="13" font-weight="bold" letter-spacing="1">SCOPE</text>
    <rect x="246" y="312" width="110" height="30" rx="15" fill="#F3E5F5"/>
    <text x="301" y="332" fill="#7B1FA2" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Workspace</text>

    <!-- Resets -->
    <text x="24" y="385" fill="#999" font-family="Arial, sans-serif" font-size="12">Resets: 1st of each month, midnight UTC</text>

    <!-- Warning -->
    <g transform="translate(24, 405)">
      <rect width="332" height="36" rx="8" fill="#FFF8E1"/>
      <text x="14" y="23" fill="#F9A825" font-family="Arial, sans-serif" font-size="18">&#9888;</text>
      <text x="36" y="23" fill="#F57F17" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Approaching threshold - 97.5% used</text>
    </g>
  </g>

  <!-- Center: Arrow to Alert -->
  <g transform="translate(480, 350)">
    <path d="M 0 0 C 60 -60 100 -60 160 0" stroke="#FF6B35" stroke-width="3" fill="none" stroke-dasharray="8,5"/>
    <polygon points="160,-4 170,0 160,4" fill="#FF6B35"/>
    <text x="80" y="-70" fill="#FF6B35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Threshold</text>
    <text x="80" y="-52" fill="#FF6B35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Exceeded</text>
  </g>

  <!-- Center: Arrow to Reject -->
  <g transform="translate(480, 450)">
    <path d="M 0 0 C 60 60 100 60 160 0" stroke="#E94B3C" stroke-width="3" fill="none" stroke-dasharray="8,5"/>
    <polygon points="160,-4 170,0 160,4" fill="#E94B3C"/>
    <text x="80" y="72" fill="#E94B3C" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Budget</text>
    <text x="80" y="90" fill="#E94B3C" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Exceeded</text>
  </g>

  <!-- Right top: Alert webhook card -->
  <g transform="translate(660, 160)" filter="url(#shadow)">
    <rect width="340" height="200" rx="16" fill="white" stroke="#d1d9e6" stroke-width="2"/>

    <!-- Header -->
    <rect width="340" height="50" rx="16" fill="url(#orangeGrad)"/>
    <rect y="34" width="340" height="16" fill="url(#orangeGrad)"/>

    <!-- Bell icon -->
    <g transform="translate(30, 25)">
      <path d="M 0 -8 C -6 -8 -10 -3 -10 3 L -10 5 L -12 8 L 12 8 L 10 5 L 10 3 C 10 -3 6 -8 0 -8 Z" fill="white" opacity="0.5"/>
      <circle cx="0" cy="11" r="3" fill="white" opacity="0.5"/>
    </g>
    <text x="52" y="32" fill="white" font-family="Arial, sans-serif" font-size="17" font-weight="bold">Webhook Alert</text>

    <!-- Webhook payload -->
    <text x="20" y="78" fill="#999" font-family="monospace, Courier" font-size="11">POST /webhook</text>
    <rect x="20" y="90" width="300" height="90" rx="8" fill="#f8f9fa"/>
    <text x="32" y="110" fill="#666" font-family="monospace, Courier" font-size="11">{ "policy": "prod-monthly",</text>
    <text x="32" y="127" fill="#666" font-family="monospace, Courier" font-size="11">  "budget": "$500.00",</text>
    <text x="32" y="144" fill="#666" font-family="monospace, Courier" font-size="11">  "spend":  "$502.18",</text>
    <text x="32" y="161" fill="#666" font-family="monospace, Courier" font-size="11">  "action": "alert" }</text>
  </g>

  <!-- Right bottom: Reject card -->
  <g transform="translate(660, 400)" filter="url(#shadow)">
    <rect width="340" height="200" rx="16" fill="white" stroke="#d1d9e6" stroke-width="2"/>

    <!-- Header -->
    <rect width="340" height="50" rx="16" fill="url(#redGrad)"/>
    <rect y="34" width="340" height="16" fill="url(#redGrad)"/>

    <!-- Stop icon -->
    <g transform="translate(30, 25)">
      <circle cx="0" cy="0" r="10" fill="white" opacity="0.4"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <text x="52" y="32" fill="white" font-family="Arial, sans-serif" font-size="17" font-weight="bold">Request Rejected</text>

    <!-- HTTP response -->
    <text x="20" y="78" fill="#999" font-family="monospace, Courier" font-size="11">HTTP Response</text>
    <rect x="20" y="90" width="300" height="90" rx="8" fill="#FFF5F5"/>
    <text x="32" y="110" fill="#E94B3C" font-family="monospace, Courier" font-size="13" font-weight="bold">429 Too Many Requests</text>
    <text x="32" y="132" fill="#666" font-family="monospace, Courier" font-size="11">{ "error": "Budget limit</text>
    <text x="32" y="149" fill="#666" font-family="monospace, Courier" font-size="11">   exceeded for policy</text>
    <text x="32" y="166" fill="#666" font-family="monospace, Courier" font-size="11">   prod-monthly" }</text>
  </g>

  <!-- Far right: Tracker strategies -->
  <g transform="translate(1060, 200)" filter="url(#shadow)">
    <rect width="280" height="150" rx="12" fill="white" stroke="#d1d9e6" stroke-width="2"/>
    <circle cx="30" cy="35" r="16" fill="#E3F2FD"/>
    <text x="30" y="40" fill="#0194E2" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold">L</text>
    <text x="56" y="32" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Local Tracker</text>
    <text x="56" y="50" fill="#999" font-family="Arial, sans-serif" font-size="12">Single instance</text>

    <line x1="20" y1="70" x2="260" y2="70" stroke="#e8ecf1" stroke-width="1"/>

    <text x="30" y="95" fill="#50C878" font-family="Arial, sans-serif" font-size="13">&#10003;</text>
    <text x="48" y="95" fill="#666" font-family="Arial, sans-serif" font-size="12">Zero latency overhead</text>
    <text x="30" y="115" fill="#50C878" font-family="Arial, sans-serif" font-size="13">&#10003;</text>
    <text x="48" y="115" fill="#666" font-family="Arial, sans-serif" font-size="12">No external dependencies</text>
    <text x="30" y="135" fill="#50C878" font-family="Arial, sans-serif" font-size="13">&#10003;</text>
    <text x="48" y="135" fill="#666" font-family="Arial, sans-serif" font-size="12">Trace backfill on restart</text>
  </g>

  <g transform="translate(1060, 400)" filter="url(#shadow)">
    <rect width="280" height="170" rx="12" fill="white" stroke="#d1d9e6" stroke-width="2"/>
    <circle cx="30" cy="35" r="16" fill="#FFEBEE"/>
    <text x="30" y="40" fill="#E94B3C" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold">R</text>
    <text x="56" y="32" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Redis Tracker</text>
    <text x="56" y="50" fill="#999" font-family="Arial, sans-serif" font-size="12">Multi-replica</text>

    <line x1="20" y1="70" x2="260" y2="70" stroke="#e8ecf1" stroke-width="1"/>

    <text x="30" y="95" fill="#50C878" font-family="Arial, sans-serif" font-size="13">&#10003;</text>
    <text x="48" y="95" fill="#666" font-family="Arial, sans-serif" font-size="12">Shared state across replicas</text>
    <text x="30" y="115" fill="#50C878" font-family="Arial, sans-serif" font-size="13">&#10003;</text>
    <text x="48" y="115" fill="#666" font-family="Arial, sans-serif" font-size="12">Atomic, race-free enforcement</text>
    <text x="30" y="135" fill="#50C878" font-family="Arial, sans-serif" font-size="13">&#10003;</text>
    <text x="48" y="135" fill="#666" font-family="Arial, sans-serif" font-size="12">Production-grade</text>
    <text x="30" y="155" fill="#999" font-family="Arial, sans-serif" font-size="13">&#8226;</text>
    <text x="48" y="155" fill="#999" font-family="Arial, sans-serif" font-size="12">Requires pip install redis</text>
  </g>

  <!-- MLflow branding -->
  <g transform="translate(1200, 750)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="36" font-weight="bold" font-style="italic">
      <tspan fill="#000000">ml</tspan><tspan fill="#0194E2">flow</tspan>
    </text>
  </g>
</svg>