<svg width="760" height="700" viewBox="0 0 760 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <marker id="arr-sm" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="700" fill="white"/>

  <!-- ── TEST CONFIG ── -->
  <rect x="120" y="12" width="320" height="68" rx="8" fill="#F97316" stroke="#EA580C" stroke-width="2"/>
  <text x="280" y="40" text-anchor="middle" fill="white" font-family="ui-monospace,Menlo,monospace" font-size="13" font-weight="600">test config (YAML)</text>
  <text x="280" y="64" text-anchor="middle" fill="white" font-family="ui-monospace,Menlo,monospace" font-size="11">my-skill · prompt · setup · judges</text>

  <!-- arrow: config → harness -->
  <line x1="280" y1="80" x2="280" y2="120" stroke="#6B7280" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── TEST HARNESS ── -->
  <rect x="120" y="124" width="320" height="198" rx="8" fill="#F97316" stroke="#EA580C" stroke-width="2"/>
  <text x="280" y="150" text-anchor="middle" fill="white" font-family="ui-monospace,Menlo,monospace" font-size="13" font-weight="600">test harness</text>
  <text x="142" y="180" fill="white" font-family="ui-monospace,Menlo,monospace" font-size="11">① start MLflow</text>
  <text x="142" y="212" fill="white" font-family="ui-monospace,Menlo,monospace" font-size="11">② run setup script</text>
  <text x="142" y="254" fill="white" font-family="ui-monospace,Menlo,monospace" font-size="11">③ install my-skill</text>
  <text x="142" y="296" fill="white" font-family="ui-monospace,Menlo,monospace" font-size="11">④ enable Claude Code tracing</text>

  <!-- branch arrows from right edge of harness -->
  <line x1="440" y1="209" x2="462" y2="209" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr-sm)"/>
  <line x1="440" y1="251" x2="462" y2="251" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr-sm)"/>

  <!-- annotation: testing environment initialized -->
  <rect x="465" y="195" width="244" height="30" rx="5" fill="#FFEDD5" stroke="#F97316" stroke-width="1.5"/>
  <text x="587" y="215" text-anchor="middle" fill="#7C2D12" font-family="ui-monospace,Menlo,monospace" font-size="10">testing environment initialized</text>

  <!-- annotation: Claude has access to my-skill/SKILL.md -->
  <rect x="465" y="237" width="244" height="44" rx="5" fill="#FFEDD5" stroke="#F97316" stroke-width="1.5"/>
  <text x="587" y="256" text-anchor="middle" fill="#7C2D12" font-family="ui-monospace,Menlo,monospace" font-size="10">Claude has access to</text>
  <text x="587" y="274" text-anchor="middle" fill="#7C2D12" font-family="ui-monospace,Menlo,monospace" font-size="10">my-skill/SKILL.md</text>

  <!-- arrow: harness → "claude -p" label → Claude Code -->
  <line x1="280" y1="322" x2="280" y2="344" stroke="#6B7280" stroke-width="2"/>
  <text x="280" y="360" text-anchor="middle" fill="#374151" font-family="ui-monospace,Menlo,monospace" font-size="11">claude -p "prompt"</text>
  <line x1="280" y1="366" x2="280" y2="406" stroke="#6B7280" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── CLAUDE CODE ── -->
  <rect x="120" y="410" width="320" height="68" rx="8" fill="#F97316" stroke="#EA580C" stroke-width="2"/>
  <text x="280" y="438" text-anchor="middle" fill="white" font-family="ui-monospace,Menlo,monospace" font-size="13" font-weight="600">Claude Code</text>
  <text x="280" y="462" text-anchor="middle" fill="white" font-family="ui-monospace,Menlo,monospace" font-size="11">(headless session)</text>

  <!-- fork from Claude Code bottom -->
  <line x1="280" y1="478" x2="280" y2="492" stroke="#6B7280" stroke-width="2"/>
  <line x1="172" y1="492" x2="388" y2="492" stroke="#6B7280" stroke-width="2"/>
  <line x1="172" y1="492" x2="172" y2="512" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr-sm)"/>
  <line x1="388" y1="492" x2="388" y2="512" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr-sm)"/>

  <!-- left label: execution traces -->
  <text x="172" y="528" text-anchor="middle" fill="#374151" font-family="ui-monospace,Menlo,monospace" font-size="10">execution traces</text>
  <text x="172" y="543" text-anchor="middle" fill="#374151" font-family="ui-monospace,Menlo,monospace" font-size="10">(tool calls, spans)</text>

  <!-- right label: final testing environment -->
  <text x="388" y="528" text-anchor="middle" fill="#374151" font-family="ui-monospace,Menlo,monospace" font-size="10">final testing environment</text>
  <text x="388" y="543" text-anchor="middle" fill="#374151" font-family="ui-monospace,Menlo,monospace" font-size="10">as modified by Claude</text>

  <!-- merge to judges -->
  <line x1="172" y1="551" x2="172" y2="563" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="388" y1="551" x2="388" y2="563" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="172" y1="563" x2="388" y2="563" stroke="#6B7280" stroke-width="2"/>
  <line x1="280" y1="563" x2="280" y2="582" stroke="#6B7280" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── JUDGES ── -->
  <rect x="120" y="586" width="320" height="68" rx="8" fill="#F97316" stroke="#EA580C" stroke-width="2"/>
  <text x="280" y="614" text-anchor="middle" fill="white" font-family="ui-monospace,Menlo,monospace" font-size="13" font-weight="600">judges</text>
  <text x="280" y="638" text-anchor="middle" fill="white" font-family="ui-monospace,Menlo,monospace" font-size="11">LLM judges · rule-based judges</text>

  <!-- arrow: judges → result -->
  <line x1="280" y1="654" x2="280" y2="672" stroke="#6B7280" stroke-width="2" marker-end="url(#arr)"/>

  <!-- result -->
  <text x="280" y="690" text-anchor="middle" fill="#374151" font-family="ui-monospace,Menlo,monospace" font-size="11">[PASS] / [FAIL] + rationale</text>
</svg>
