<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 608" width="1020" height="608">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#495057" /></marker>
  <style>text { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }</style>
</defs>

<!-- Title -->
<text x="510" y="28" font-size="22" fill="#1971c2" text-anchor="middle" font-weight="600">inspect-mlflow Architecture</text>

<!-- Row 1: Inspect AI entry point -->
<rect x="310" y="48" width="400" height="48" rx="8" fill="#1971c2" />
<text x="510" y="77" font-size="14" fill="#f8f9fa" text-anchor="middle" font-weight="500">inspect eval task.py --model openai/gpt-4o</text>

<!-- Arrow: entry to hooks -->
<path d="M 510 96 L 510 140" stroke="#495057" fill="none" stroke-width="2" marker-end="url(#arrow)" />
<text x="530" y="124" font-size="13" fill="#868e96">lifecycle events</text>

<!-- Row 2: Auto-registered hooks container -->
<rect x="160" y="144" width="700" height="116" rx="8" stroke="#3b5bdb" fill="none" stroke-width="1.5" stroke-dasharray="8,4" />
<text x="176" y="164" font-size="11" fill="#3b5bdb" font-weight="600">Auto-registered hooks (entry points)</text>

<!-- Tracking Hook -->
<rect x="188" y="176" width="300" height="44" rx="8" fill="#3b5bdb" />
<text x="338" y="203" font-size="14" fill="#f8f9fa" text-anchor="middle">Tracking Hook</text>
<text x="338" y="232" font-size="13" fill="#868e96" text-anchor="middle">runs, metrics, artifacts, autolog</text>

<!-- Tracing Hook -->
<rect x="532" y="176" width="300" height="44" rx="8" fill="#3b5bdb" />
<text x="682" y="203" font-size="14" fill="#f8f9fa" text-anchor="middle">Tracing Hook</text>
<text x="682" y="232" font-size="13" fill="#868e96" text-anchor="middle">spans, assessments</text>

<!-- Arrow: hooks to MLflow Server -->
<path d="M 510 260 L 510 308" stroke="#495057" fill="none" stroke-width="2" marker-end="url(#arrow)" />

<!-- Row 3: MLflow Server -->
<rect x="200" y="312" width="620" height="56" rx="8" fill="#087f5b" />
<text x="510" y="345" font-size="14" fill="#f8f9fa" text-anchor="middle" font-weight="500">MLflow Server (runs, traces, artifacts, tables, assessments)</text>

<!-- Branch arrows to two standalone tools -->
<!-- Left: Scout reads FROM MLflow -->
<path d="M 340 368 L 340 396 L 220 396 L 220 424" stroke="#495057" fill="none" stroke-width="2" marker-end="url(#arrow)" />
<text x="140" y="390" font-size="13" fill="#868e96">reads traces</text>

<!-- Right: .eval logs to compare_evals -->
<path d="M 680 368 L 680 396 L 800 396 L 800 424" stroke="#495057" fill="none" stroke-width="2" marker-end="url(#arrow)" />
<text x="820" y="390" font-size="13" fill="#868e96">reads .eval logs</text>

<!-- Row 4: Standalone tools container -->
<rect x="80" y="428" width="860" height="72" rx="8" stroke="#495057" fill="none" stroke-width="1.5" stroke-dasharray="8,4" />
<text x="96" y="448" font-size="11" fill="#495057" font-weight="600">Standalone analysis (run after evaluation)</text>

<!-- Scout Import -->
<rect x="108" y="456" width="240" height="36" rx="8" fill="#495057" />
<text x="228" y="479" font-size="13" fill="#f8f9fa" text-anchor="middle">import_mlflow_traces()</text>

<!-- compare_evals -->
<rect x="672" y="456" width="240" height="36" rx="8" fill="#495057" />
<text x="792" y="479" font-size="13" fill="#f8f9fa" text-anchor="middle">compare_evals()</text>

<!-- Outputs -->
<rect x="108" y="520" width="240" height="36" rx="8" fill="#087f5b" />
<text x="228" y="543" font-size="13" fill="#f8f9fa" text-anchor="middle">Inspect Scout transcripts</text>

<rect x="672" y="520" width="240" height="36" rx="8" fill="#087f5b" />
<text x="792" y="543" font-size="13" fill="#f8f9fa" text-anchor="middle">ComparisonResult</text>

<!-- Arrows from standalone to outputs -->
<path d="M 228 492 L 228 516" stroke="#495057" fill="none" stroke-width="2" marker-end="url(#arrow)" />
<path d="M 792 492 L 792 516" stroke="#495057" fill="none" stroke-width="2" marker-end="url(#arrow)" />

<!-- Legend -->
<rect x="280" y="582" width="12" height="12" rx="3" fill="#1971c2" />
<text x="300" y="593" font-size="11" fill="#495057">Inspect AI</text>
<rect x="400" y="582" width="12" height="12" rx="3" stroke="#3b5bdb" fill="none" stroke-width="1.5" stroke-dasharray="4,2" />
<text x="420" y="593" font-size="11" fill="#495057">Auto-registered hooks</text>
<rect x="580" y="582" width="12" height="12" rx="3" fill="#087f5b" />
<text x="600" y="593" font-size="11" fill="#495057">MLflow / output</text>
<rect x="720" y="582" width="12" height="12" rx="3" fill="#495057" />
<text x="740" y="593" font-size="11" fill="#495057">Standalone tools</text>
</svg>
