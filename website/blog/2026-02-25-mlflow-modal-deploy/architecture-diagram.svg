<svg xmlns="http://www.w3.org/2000/svg" width="880" height="820" viewBox="60 -10 880 820">
<defs>
  <marker id="arrow-495057" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#495057" /></marker>
  <linearGradient id="bridge-border" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#228be6" />
    <stop offset="100%" stop-color="#09AF58" />
  </linearGradient>
  <style>text { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }</style>
</defs>

<!-- Title -->
<text x="500" y="32" font-size="22" fill="#228be6" text-anchor="middle" font-weight="600">Modal Serverless Deployment Pipeline</text>

<!-- MLflow container -->
<rect x="200" y="52" width="600" height="96" rx="8" stroke="#228be6" fill="none" stroke-width="1.5" stroke-dasharray="8,4" />
<text x="216" y="72" font-size="11" fill="#228be6" font-weight="600">MLflow</text>

<!-- Step 1: MLflow Model Registry -->
<rect x="280" y="80" width="440" height="48" rx="8" fill="#228be6" />
<text x="500" y="108" font-size="15" fill="#f8f9fa" text-anchor="middle">MLflow Model Registry</text>

<!-- Arrow 1 to plugin container -->
<path d="M 500 128 L 500 180" stroke="#495057" fill="none" stroke-width="2" marker-end="url(#arrow-495057)" />

<!-- Plugin container (gradient border: blue to green, thicker) -->
<rect x="160" y="184" width="680" height="360" rx="8" stroke="url(#bridge-border)" fill="none" stroke-width="2.5" stroke-dasharray="8,4" />
<!-- Dual-color label: mlflow in blue, -modal plugin in green -->
<text x="176" y="204" font-size="11" font-weight="600">
  <tspan fill="#228be6">mlflow</tspan><tspan fill="#09AF58">-modal</tspan><tspan fill="#495057">-deploy plugin</tspan>
</text>

<!-- Step 2: Download and inspect model (MLflow blue - reads from MLflow) -->
<rect x="280" y="216" width="440" height="48" rx="8" fill="#228be6" />
<text x="500" y="244" font-size="14" fill="#f8f9fa" text-anchor="middle">Download and inspect model</text>

<!-- Arrow 2 to 3 -->
<path d="M 500 264 L 500 296" stroke="#495057" fill="none" stroke-width="2" marker-end="url(#arrow-495057)" />

<!-- Step 3: Extract dependencies (blend - reads MLflow artifact) -->
<rect x="280" y="300" width="440" height="48" rx="8" fill="#1a7fb3" />
<text x="500" y="328" font-size="14" fill="#f8f9fa" text-anchor="middle">Extract model dependencies</text>

<!-- Arrow 3 to 4 -->
<path d="M 500 348 L 500 380" stroke="#495057" fill="none" stroke-width="2" marker-end="url(#arrow-495057)" />

<!-- Step 4: Generate Modal app (blend - writes for Modal) -->
<rect x="280" y="384" width="440" height="48" rx="8" fill="#1a9a52" />
<text x="500" y="412" font-size="14" fill="#f8f9fa" text-anchor="middle">Generate Modal app code</text>

<!-- Arrow 4 to 5 -->
<path d="M 500 432 L 500 464" stroke="#495057" fill="none" stroke-width="2" marker-end="url(#arrow-495057)" />

<!-- Step 5: Upload to Volume (Modal green - writes to Modal) -->
<rect x="280" y="468" width="440" height="48" rx="8" fill="#09AF58" />
<text x="500" y="496" font-size="14" fill="#f8f9fa" text-anchor="middle">Upload model to Volume</text>

<!-- Arrow 5 to Modal Cloud -->
<path d="M 500 516 L 500 572" stroke="#495057" fill="none" stroke-width="2" marker-end="url(#arrow-495057)" />

<!-- Modal Cloud container -->
<rect x="200" y="576" width="600" height="168" rx="8" stroke="#09AF58" fill="none" stroke-width="1.5" stroke-dasharray="8,4" />
<text x="216" y="596" font-size="11" fill="#09AF58" font-weight="600">Modal Cloud</text>

<!-- Step 6: modal deploy -->
<rect x="320" y="608" width="360" height="48" rx="8" fill="#09AF58" />
<text x="500" y="636" font-size="15" fill="#f8f9fa" text-anchor="middle">modal deploy</text>

<!-- Arrow to outputs -->
<path d="M 500 656 L 500 688" stroke="#495057" fill="none" stroke-width="2" marker-end="url(#arrow-495057)" />

<!-- GPU + Endpoints side by side -->
<rect x="232" y="692" width="240" height="36" rx="6" fill="#09AF58" />
<text x="352" y="715" font-size="12" fill="#f8f9fa" text-anchor="middle">GPU (T4 / A100 / H100 / H200)</text>

<rect x="488" y="692" width="280" height="36" rx="6" fill="#09AF58" />
<text x="628" y="715" font-size="12" fill="#f8f9fa" text-anchor="middle">FastAPI /predict + /predict_stream</text>

<!-- Legend -->
<rect x="140" y="772" width="16" height="16" rx="3" stroke="#228be6" fill="none" stroke-width="1.5" stroke-dasharray="4,2" />
<text x="164" y="785" font-size="11" fill="#495057">MLflow</text>

<rect x="300" y="772" width="16" height="16" rx="3" stroke="url(#bridge-border)" fill="none" stroke-width="2" stroke-dasharray="4,2" />
<text x="324" y="785" font-size="11">
  <tspan fill="#228be6">mlflow</tspan><tspan fill="#09AF58">-modal</tspan><tspan fill="#495057">-deploy plugin</tspan>
</text>

<rect x="580" y="772" width="16" height="16" rx="3" stroke="#09AF58" fill="none" stroke-width="1.5" stroke-dasharray="4,2" />
<text x="604" y="785" font-size="11" fill="#495057">Modal Cloud</text>
</svg>